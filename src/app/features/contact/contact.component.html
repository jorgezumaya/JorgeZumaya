<section class="page">
  <div class="layout">
    <!-- Left: identity info -->
    <div class="info">
      <h1>Let's talk.</h1>
      <p class="info__sub">Have a project in mind? Want to connect? Drop me a line.</p>
      <ul class="links">
        <li>
          <a href="mailto:jorge.juarez87@me.com" class="link-chip">
            <span class="link-chip__label">Email</span>
            <span class="link-chip__value">jorge.juarez87&#64;me.com</span>
          </a>
        </li>
        <li>
          <a
            href="https://www.linkedin.com/in/jorgezumaya/"
            target="_blank"
            rel="noopener"
            class="link-chip"
          >
            <span class="link-chip__label">LinkedIn</span>
            <span class="link-chip__value">/in/jorgezumaya</span>
          </a>
        </li>
        <li>
          <a href="https://github.com/jorgezumaya" target="_blank" rel="noopener" class="link-chip">
            <span class="link-chip__label">GitHub</span>
            <span class="link-chip__value">/jorgezumaya</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- Right: form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label>
        Name
        <input formControlName="name" autocomplete="name" />
      </label>
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label>
        Subject
        <input formControlName="subject" />
      </label>
      <label>
        Message
        <textarea formControlName="message" rows="6"></textarea>
      </label>

      <!-- honeypot — hidden from real users -->
      <input
        type="text"
        formControlName="website"
        class="honeypot"
        tabindex="-1"
        aria-hidden="true"
        autocomplete="off"
      />

      <button type="submit" [disabled]="form.invalid || sending()">
        {{ sending() ? 'Sending…' : 'Send message' }}
      </button>
    </form>
  </div>
</section>

@if (toast()) {
  <div class="toast" [class.toast--error]="toast() === 'error'" role="status">
    @if (toast() === 'success') {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      Thanks — I'll get back to you soon.
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
      </svg>
      Something went wrong. Please try again.
    }
  </div>
}
