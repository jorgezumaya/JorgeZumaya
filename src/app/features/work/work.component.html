<section class="page">
  <header class="page__header" appReveal>
    <p class="eyebrow">Portfolio</p>
    <h1>Work</h1>
    <p class="page__sub">A selection of projects — professional work and personal builds.</p>
  </header>

  <div class="grid" appReveal>
    @for (project of projects; track project.slug) {
      <app-project-card [project]="project" />
    }
  </div>

  <!-- TODO: add more projects from resume when available -->
  <p class="page__note" appReveal>More projects coming.</p>
</section>
